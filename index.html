<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarStore</title>
</head>
<body>
    <header>
        <h3>Cadastre seu veículo para vender mais rápido</h3>
    </header>
    <div>
        <div>
            <p>Formulário</p>
        </div>

        <div>
            <h1>Venda fácil seu carro!</h1>
            <p>Descreva as caracteristicas do seu carro e marque os opcionais que ele possui</p>
            <form>

            <div>
                <label for="title">Título do Anúncio <span>*</span></label>
                <input type="text" name="title" id="title" placeholder="Um título para anunciar seu carro">
            </div>

            <div>
                <label for="preco">Preço <span>*</span></label>
                <input type="number" name="preco" id="preco" placeholder="Defina o preço">
            </div>

            <div>
                <label for="descricao">Descreva seu carro <span>*</span></label>
               <textarea name="descricao" id="descricao" placeholder= "Faça a descrição do seu veículo"></textarea>
            </div>
            <div>
                <label for="marca">Marca <span>*</span></label>
                <input type="text"name="marca" id="marca" placeholder="Escolha a marca do veículo">
            </div>

            <div>
                <label for="modelo">Modelo <span>*</span></label>
                <input type="text" mame="modelo" id="modelo" placeholder="Defina o modelo do veículo">
            </div>

            <div> 
                <label for="kilometragem">Kilometragem <span>*</span></label>
                <input type="number" name="kilometragem" placeholder="Kilometragem do veículo">
            </div>

            <div>
                <label for="data-de-compra">Data de compra<span>*</span></label>
                <input type="date" name="data-de-compra" placeholder="Ano de compra do veículo">

            </div>

            </form>
        </div>
    </div>
</body>
</html>
